services:
  - type: web
    name: lotef-api
    runtime: node
    region: oregon
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node index.js
    nodeVersion: "20"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ORDER_EMAIL
        sync: false
