services:
  - type: web
    name: lotef-api
    runtime: node
    rootDir: server
    region: oregon
    buildCommand: npm install
    startCommand: node index.js
    nodeVersion: "20"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ORDER_EMAIL
        sync: false

  - type: web
    name: lotef-site
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    region: oregon
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
